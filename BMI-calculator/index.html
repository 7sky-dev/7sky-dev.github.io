<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱‍💻</text></svg>">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.3.js" integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM=" crossorigin="anonymous"></script>

    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="root d-flex justify-content-center align-items-center">
        <div class="calculator container-md d-flex flex-column justify-content-center align-items-center">
            <div id="info" class="alert mt-3 bg-warning" style="width: 100%;" role="alert">
                <p class="text-center"><b>Body Mass Index</b></p>
                <div class="row">
                    <div class="col text-center">Underweight</div>
                    <div class="col text-center">Normal</div>
                    <div class="col text-center">Overweight</div>
                    <div class="col text-center">Obese</div>
                    <div class="col text-center">Extremly obese</div>
                </div>
                <div class="row">
                    <div class="col text-center"><18.5</div>
                    <div class="col text-center">18.5-24.9</div>
                    <div class="col text-center">25-29.9</div>
                    <div class="col text-center">30-34.9</div>
                    <div class="col text-center">35<</div>
                </div>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">Height:</span>
                <input id="height" type="number" class="form-control" placeholder="Enter your height in cm" aria-label="Height" aria-describedby="basic-addon1">
              </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">Weight:</span>
                <input id="weight" type="number" class="form-control" placeholder="Enter your weight in kg" aria-label="Weight" aria-describedby="basic-addon1">
            </div>

              <button id="button_calculate" type="button" class="btn btn-warning">Calculate</button>

              <div id="result" class="alert mt-3" role="alert">
                
            </div>
              

        </div>
    </div>
    
    <script>

        let height; // cm
        let weight; // kg
        let bmi;

        $("#result").css("backgroundColor","#FFFFFF");
        $("#result").hide();

        $("#button_calculate").click(function(){

            $("#result").removeClass("bg-success");
            $("#result").removeClass("white");

            height = $("#height").val();
            weight = $("#weight").val();

            if(height=="" || weight==""){
                bmi=0;
            }else{
                height = height/100;
                height = height*height;

                bmi = weight/height;
            
                if(bmi<18.5){
                    $("#result").css("backgroundColor","#B71C1C");
                }else if(bmi>18.5 && bmi <25){
                    $("#result").addClass("bg-success");
                }else if(bmi>25 && bmi<30){
                    $("#result").css("backgroundColor","#D32F2F");
                }else if(bmi>30 && bmi<35){
                    $("#result").css("backgroundColor","#B71C1C");
                }else if(bmi>35){
                    $("#result").css("backgroundColor","#000000");
                    $("#result").addClass("white");
                }

            };
            
            $("#result").html("Your BMI is equal to <b>"+Math.round((bmi + Number.EPSILON) * 100) / 100+"</b>");
            $("#result").fadeIn();
 
        });
    </script>

</body>
</html>
